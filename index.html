<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub-Issue-Tracker</title>
    <!-- Linked css -->
    <link rel="stylesheet" href="Style/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Tailwind + Daisy CDN-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-300">
    <main class="container mx-auto text-center ">
        <section class="min-h-screen pt-60">

            <!-- login form  -->

            <div class="flex flex-col max-w-md p-6 mx-auto rounded-md sm:p-10 dark:bg-gray-50 dark:text-gray-800">
                <div class="mb-8 text-center">
                    <h1 class="my-3 text-4xl font-bold">Sign in</h1>
                    <p class="text-sm dark:text-gray-600">Sign in to access your account</p>
                </div>
                <form class="space-y-8">
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between mb-2">
                                <label for="password" class="text-sm">Username</label>
                            </div>
                            <input type="text" name="username" id="username" placeholder="Enter Username" value="admin"
                                class="w-full px-3 py-2 border rounded-md dark:border-gray-300 dark:bg-gray-50 dark:text-gray-800">
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label for="password" class="text-sm">Password</label>
                            </div>
                            <input type="text" name="password" id="password" placeholder="Enter Password"
                                value="admin123"
                                class="w-full px-3 py-2 border rounded-md dark:border-gray-300 dark:bg-gray-50 dark:text-gray-800">
                        </div>
                    </div>
                    <div class="space-y-5">
                        <div>
                            <button id="login-btn" class="btn btn-block btn-primary">Sign in</button>

                            <p id="login-error" class="text-red-500 text-sm"></p>
                        </div>

                    </div>
                </form>
            </div>
            <!--  -->

        </section>
    </main>



    <!-- JS linked -->
    <script src="Script/login.js"></script>
</body>

</html>
